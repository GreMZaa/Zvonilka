<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Звонилка — бесплатные голосовые звонки через WebRTC, устойчивые к блокировкам.">
  <meta name="theme-color" content="#090E17">
  
  <!-- Apple Web App Meta -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Звонилка">

  <title>Звонилка</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Иконки -->
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

  <!-- Шрифты: Plus Jakarta Sans (для заголовков) и Space Grotesk (для интерфейса) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Стили -->
  <link rel="stylesheet" href="src/css/styles.css">
  <link rel="stylesheet" href="src/css/animations.css">
</head>
<body>

  <!-- Background Ambient Glow -->
  <div class="ambient-glow">
    <div class="glow-orb glow-orb--1"></div>
    <div class="glow-orb glow-orb--2"></div>
  </div>

  <div id="app" class="app-container state-idle">
    
    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <span class="logo__icon">✨</span>
        <span class="logo__text">ЗВОНИЛКА</span>
      </div>
      <div id="room-badge" class="room-badge hidden">
        <span class="room-badge__label">Код:</span>
        <code id="room-code" class="room-badge__code">------</code>
        <button id="btn-copy" class="room-badge__copy" aria-label="Копировать код">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="app-main">
      
      <!-- Status & Timer display -->
      <div class="status-container">
        <h2 id="call-status" class="status-text">Готов к звонку</h2>
        <div id="call-timer" class="timer-text hidden">00:00</div>
      </div>

      <!-- Interactive Breathing Fluid Orb / Visualizer -->
      <div class="visualizer-container">
        <div class="pulse-ring pulse-ring--1"></div>
        <div class="pulse-ring pulse-ring--2"></div>
        <div class="pulse-ring pulse-ring--3"></div>
        
        <div class="fluid-orb-wrapper">
          <div class="fluid-orb">
            <!-- Morphing dynamic SVG overlay -->
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="orb-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="var(--gradient-start)" />
                  <stop offset="100%" stop-color="var(--gradient-end)" />
                </linearGradient>
              </defs>
              <path fill="url(#orb-gradient)" d="M45.7,-64.1C58.8,-55.8,68.9,-42.1,74,-26.8C79.1,-11.5,79.2,5.2,74.9,20.8C70.6,36.4,61.9,50.7,49.2,60.1C36.4,69.5,19.6,73.9,2.6,70.3C-14.4,66.8,-31.6,55.2,-45.3,42.5C-59.1,29.8,-69.5,15.9,-71,-0.9C-72.6,-17.7,-65.4,-37.4,-51.9,-45.8C-38.4,-54.2,-18.6,-61.3,-0.6,-60.5C17.4,-59.6,32.6,-72.4,45.7,-64.1Z" transform="translate(100 100)" />
            </svg>
          </div>
          <div class="orb-icon">📞</div>
        </div>
      </div>

      <!-- Interaction Form (Join Room) -->
      <div id="join-section" class="join-section">
        <p class="join-section__title">Принять входящий вызов</p>
        <div class="join-control">
          <input
            id="input-room"
            type="text"
            class="input-room"
            placeholder="Введи 8-значный код..."
            maxlength="8"
            autocomplete="off"
            pattern="[a-zA-Z0-9]*"
            inputmode="text"
          />
          <button id="btn-join" class="btn-action btn-action--secondary" aria-label="Присоединиться">
            Войти
          </button>
        </div>
      </div>

      <!-- Call History Overlay (collapsed by default) -->
      <div id="history-section" class="history-section">
        <button id="btn-toggle-history" class="btn-history-toggle">⏳ История звонков</button>
        <div id="history-list" class="history-list hidden">
          <!-- Записи истории звонков будут вставляться динамически через JS -->
        </div>
      </div>

    </main>

    <!-- Bottom Controls Area -->
    <footer class="app-footer">
      
      <!-- Idle State Action -->
      <div id="action-idle" class="action-group">
        <button id="btn-call" class="btn-main">
          Позвонить маме
        </button>
      </div>

      <!-- Calling / Connected State Actions (Mute & Hangup) -->
      <div id="action-active" class="action-group hidden">
        <button id="btn-mute" class="btn-round btn-round--mute" aria-label="Выключить микрофон">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v1a7 7 0 0 1-14 0v-1"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
        </button>
        <button id="btn-hangup" class="btn-round btn-round--danger" aria-label="Сбросить звонок">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.68 13.31a16 16 0 0 0 3.41 3.41l2.28-2.28a1 1 0 0 1 1.14-.24 11.54 11.54 0 0 0 4.28 1.39 1 1 0 0 1 .91 1v3.79a1 1 0 0 1-.96 1A20.84 20.84 0 0 1 2 4.04a1 1 0 0 1 1-1h3.79a1 1 0 0 1 1 .91 11.54 11.54 0 0 0 1.39 4.28 1 1 0 0 1-.24 1.14l-2.28 2.28z"></path></svg>
        </button>
      </div>

      <!-- Incoming Call State Actions -->
      <div id="action-incoming" class="action-group hidden">
        <button id="btn-decline" class="btn-round btn-round--danger" aria-label="Отклонить">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.68 13.31a16 16 0 0 0 3.41 3.41l2.28-2.28a1 1 0 0 1 1.14-.24 11.54 11.54 0 0 0 4.28 1.39 1 1 0 0 1 .91 1v3.79a1 1 0 0 1-.96 1A20.84 20.84 0 0 1 2 4.04a1 1 0 0 1 1-1h3.79a1 1 0 0 1 1 .91 11.54 11.54 0 0 0 1.39 4.28 1 1 0 0 1-.24 1.14l-2.28 2.28z"></path></svg>
        </button>
        <button id="btn-accept" class="btn-round btn-round--success" aria-label="Ответить">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        </button>
      </div>

    </footer>

    <!-- Signal logging (useful for debugging, minimized by default, can be toggled or styled elegantly) -->
    <div id="debug-log-wrapper" class="debug-log-wrapper collapsed">
      <button id="btn-toggle-log" class="btn-toggle-log">Детали соединения ▾</button>
      <div id="signal-log" class="signal-log"></div>
    </div>

  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Приложение -->
  <script type="module" src="src/js/app.js"></script>

</body>
</html>
